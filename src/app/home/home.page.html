<ion-content [fullscreen]="true" [scrollY]="false">
  @if (!gameService.isReady()) {
    <div class="loading-wrapper">
      <ion-spinner name="crescent" color="light"></ion-spinner>
    </div>
  } @else {
    <div class="game-board" [ngClass]="layoutClass">
      
      @for (p of players(); track p.id; let i = $index) {
        <app-player-area 
          [player]="p"
          [extraClass]="p.cssClass || ''"
          class="player-slot"
          [ngClass]="'player-' + (p.id)">
        </app-player-area>
      }

    </div>
  }
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="minimal-footer">
    <div class="footer-buttons">
      <ion-button fill="clear" color="medium" (click)="goBack()">
        <ion-icon name="home" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="medium" (click)="reset()">
        <ion-icon name="refresh" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
